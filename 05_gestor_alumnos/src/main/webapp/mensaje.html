<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estado de la Operación</title>
    <style>
        :root {
            --success: #27ae60;
            --error: #e74c3c;
            --primary: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            /* La clase dinámica cambiará el color del borde */
            border-top: 8px solid var(--primary); 
        }

        /* Clases dinámicas */
        .card.success { border-top-color: var(--success); }
        .card.error { border-top-color: var(--error); }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        
        .success .icon { color: var(--success); }
        .error .icon { color: var(--error); }

        h1 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn {
            text-decoration: none;
            color: white;
            background-color: var(--primary);
            padding: 12px 25px;
            border-radius: 8px;
            transition: opacity 0.3s;
        }

        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card" th:classappend="${clase}">
        
        <div class="icon">
            <span th:if="${clase == 'success'}">✔</span>
            <span th:if="${clase == 'error'}">✖</span>
        </div>
        
        <h1 th:text="${mensaje}">Mensaje de ejemplo</h1>
        
        <a th:href="@{/goMenu}" class="btn">Volver al Menú</a>
    </div>

</body>
</html>
