<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Alumnos</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { color: var(--primary); text-align: center; }

        /* Estilo del Filtro */
        .filter-section {
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        select, button {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }

        button {
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-view { background-color: var(--accent); color: white; }
        .btn-view:hover { background-color: #2980b9; }

        /* Estilo de la Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 8px;
        }

        thead {
            background-color: var(--primary);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        tr:hover { background-color: #fcfcfc; }

        /* Botones de Acción */
        .actions-div { display: flex; gap: 8px; justify-content: start; }

        .btn-edit { background-color: #f39c12; color: white; padding: 6px 12px; font-size: 0.9rem; }
        .btn-edit:hover { background-color: #d68910; }

        .btn-delete { background-color: var(--danger); color: white; padding: 6px 12px; font-size: 0.9rem; }
        .btn-delete:hover { background-color: #c0392b; }

        .empty-msg {
            text-align: center;
            color: #7f8c8d;
            padding: 40px;
        }

        .link-back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2>Gestión de Alumnos por Curso</h2>

        <div class="filter-section">
            <form th:action="@{/alumnosCurso}" method="get" style="display: flex; gap: 10px; align-items: center;">
                <label for="cursos"><strong>Curso:</strong></label>
                <select name="curso" id="cursos">
                    <option value="" th:disabled="${cursoSeleccionado != null}">Seleccione un curso...</option>
                    <option th:each="c : ${cursos}" 
                            th:value="${c}" 
                            th:text="${c}" 
                            th:selected="${c == cursoSeleccionado}">
                    </option>
                </select>
                <button type="submit" class="btn-view">Filtrar Listado</button>   
            </form>
        </div>

        <table th:if="${alumnos != null and !alumnos.isEmpty()}">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Nota</th>
                    <th>Curso</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${alumnos}">
                    <td th:text="${a.nombre}" style="font-weight: 600;"></td>
                    <td th:text="${a.email}"></td>
                    <td>
                        <span th:text="${a.nota}" 
                              th:style="${a.nota >= 5} ? 'color: var(--success); font-weight: bold;' : 'color: var(--danger); font-weight: bold;'">
                        </span>
                    </td>
                    <td th:text="${a.curso}"></td>
                    <td>
                        <div class="actions-div">
                            <form th:action="@{/editar}" method="get">
                                <input type="hidden" name="idAlumno" th:value="${a.idAlumno}">
                                <button type="submit" class="btn-edit">Editar</button>
                            </form>

                            <form th:action="@{/eliminar}" method="post">
                                <input type="hidden" name="idAlumno" th:value="${a.idAlumno}">
                                <button type="submit" class="btn-delete" 
                                        onclick="return confirm('¿Estás seguro de que deseas eliminar permanentemente a este alumno?')">
                                    Eliminar
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="empty-msg" th:if="${alumnos != null and alumnos.isEmpty()}">
            <h3>⚠️ No se encontraron alumnos para este curso.</h3>
        </div>
    
        <a th:href="@{/goMenu}" class="link-back">← Volver al panel principal</a>
    </div>

</body>
</html>
