<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menú Principal - Librería</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container" style="text-align: center;">
        <h1>Bienvenido, <span th:text="${session.cliente.usuario}">Usuario</span></h1>
        <p>¿Qué desea hacer hoy?</p>
        
        <div class="menu-options" style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
            <a th:href="@{/irCatalogo}" class="btn-view" style="padding: 20px; text-decoration: none; border-radius: 8px;">
                🛒 1. Ir a Comprar
            </a>

            <a th:href="@{/informeVentas}" class="btn-buy" style="padding: 20px; text-decoration: none; border-radius: 8px; background-color: #2c3e50;">
                📊 2. Informe de Ventas
            </a>
        </div>
        
        <br><br>
        <a th:href="@{/irLogin}">Cerrar Sesión</a>
    </div>
</body>
</html>
