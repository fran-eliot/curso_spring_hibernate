<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<div class="container container-narrow">
	    <h2>Informe de Ventas</h2>
	    
	    <div class="filter-section">
	        <form th:action="@{/informeVentas}" method="get" class="filter-form">
	            <label>Desde:</label>
	            <input type="datetime-local" id="fechaInicio" name="fechaInicio" class="form-control" required>
	            
	            <label>Hasta:</label>
	            <input type="datetime-local" id="fechaFin" name="fechaFin" class="form-control" required>
	            
	            <button type="submit" class="btn-view">Generar Informe</button>
	        </form>
	    </div>
	
	    <div class="table-container">
		    <table th:if="${ventas != null and !ventas.isEmpty()}">
		        <thead>
		            <tr>
		                <th>Fecha</th>
		                <th>Cliente</th>
		                <th>Libro</th>
		                <th>Precio</th>
		            </tr>
		        </thead>
		        <tbody>
		            <tr th:each="v : ${ventas}">
		                <td th:text="${#temporals.format(v.fecha, 'dd/MM/yyyy HH:mm')}"></td>
		                <td th:text="${v.cliente.usuario}" class="font-bold"></td>
		                <td th:text="${v.libro.titulo}"></td>
		                <td th:text="${v.libro.precio} + '€'"></td>
		            </tr>
		        </tbody>
		        <tfoot>
		            <tr style="background-color: #f8fafc; font-weight: bold; border-top: 2px solid #e2e8f0;">
		                <td colspan="3" style="text-align: right; padding: 15px;">TOTAL INGRESOS:</td>
		                <td style="padding: 15px; color: #166534;">
		                    <span th:text="${#numbers.formatDecimal(total, 1, 2)} + '€'"></span>
		                </td>
		            </tr>
		        </tfoot>
		    </table>
		    
		    <div th:if="${ventas != null and ventas.isEmpty()}" style="margin-top: 20px; color: #991b1b;">
		        No se han encontrado ventas en el rango de fechas seleccionado.
		    </div>
		</div>
	</div>
</body>
</html>
