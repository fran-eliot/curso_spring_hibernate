<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Libro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container container-narrow">
        <h1>Editar Libro</h1>
        <form th:action="@{/update}" method="post">
            <input type="hidden" name="isbn" th:value="${libro.isbn}">
    		<input type="hidden" name="temaAnterior" th:value="${temaAnterior}">

            <label>Título</label>
            <input type="text" name="titulo" th:value="${libro.titulo}" required>

            <label>Autor</label>
            <input type="text" name="autor" th:value="${libro.autor}" required>

            <label>Precio (€)</label>
            <input type="number" step="0.01" name="precio" th:value="${libro.precio}" required>

            <label>Páginas</label>
            <input type="number" name="paginas" th:value="${libro.paginas}" required>
            
            <label>Tema</label>
            <input type="number" name="nombreTema" th:value="${libro.nombreTema}" required>
            
            <button type="submit">Actualizar Datos</button>
            <p><a th:href="@{/librosTema(tema=${temaAnterior})}">← Cancelar y volver</a></p>
        </form>
    </div>
</body>
</html>
