# Conversion to YAML from Properties formar report
# Warnings:
# - The yaml file had comments which are lost in the refactoring!
spring:
  application:
    name: servicio_alumnos
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
  profiles:
    active: dev
server:
  port: 8005
  servlet:
    context-path: /escuela
---
spring:
  config:
    active:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/alumnoscursos?useSSL=false&serverTimezone=UTC
    username: root
    password: root
---
spring:
  config:
    active:
    on-profile: prod
  datasource:
    url: jdbc:mysql://${HOST_DB}:${PORT_DB}/alumnoscursos?useSSL=false&serverTimezone=UTC
    username: ${USER_DB}
    password: ${PASSWORD_DB}		
